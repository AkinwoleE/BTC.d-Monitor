name: BTC.D Pairs Trader

on:
  schedule:
    - cron: '0,15,30,45 * * * *'
  workflow_dispatch:

jobs:
  trade:
    name: Run Signal Check + Execute Trade
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    # Allow workflow to commit state back to repo
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python dependencies
        run: pip install requests

      - name: Run trader
        env:
          TELEGRAM_BOT_TOKEN:          ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:            ${{ secrets.TELEGRAM_CHAT_ID }}
          DECIBEL_PRIVATE_KEY:         ${{ secrets.DECIBEL_PRIVATE_KEY }}
          DECIBEL_SUBACCOUNT:          ${{ secrets.DECIBEL_SUBACCOUNT }}
          DECIBEL_NODE_API_KEY:        ${{ secrets.DECIBEL_NODE_API_KEY }}
          DECIBEL_GAS_STATION_API_KEY: ${{ secrets.DECIBEL_GAS_STATION_API_KEY }}
          POSITION_SIZE_USD:           ${{ secrets.POSITION_SIZE_USD }}
          LEVERAGE:                    ${{ secrets.LEVERAGE }}
          SLIPPAGE:                    ${{ secrets.SLIPPAGE }}
        run: python btcd_trader.py

      # Commit updated state file back to repo after every run
      - name: Save trader state to repo
        if: always()
        run: |
          git config user.name  "BTC.D Trader Bot"
          git config user.email "trader-bot@noreply.github.com"
          git add trader_state.json
          git diff --staged --quiet || git commit -m "bot: update trader state [skip ci]"
          git push
