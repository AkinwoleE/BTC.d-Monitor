name: BTC.D Pairs Trader

on:
  # Primary trigger: cron-job.org POSTs here every 5 min (precise, external)
  repository_dispatch:
    types: [cron-trigger]
  # Fallback: GitHub built-in scheduler
  schedule:
    - cron: '0,5,10,15,20,25,30,35,40,45,50,55 * * * *'
  # Manual trigger from Actions tab
  workflow_dispatch:

# Prevent overlapping runs (but don't cancel mid-execution trades)
concurrency:
  group: trader-run
  cancel-in-progress: false

jobs:
  trade:
    name: Run Signal Check + Execute Trade
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache npx (@decibeltrade/cli)
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npx-decibel-cli-${{ runner.os }}-v1

      - name: Install Python dependencies
        run: pip install requests

      - name: Run trader
        env:
          TELEGRAM_BOT_TOKEN:          ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:            ${{ secrets.TELEGRAM_CHAT_ID }}
          DECIBEL_PRIVATE_KEY:         ${{ secrets.DECIBEL_PRIVATE_KEY }}
          DECIBEL_SUBACCOUNT:          ${{ secrets.DECIBEL_SUBACCOUNT }}
          DECIBEL_NODE_API_KEY:        ${{ secrets.DECIBEL_NODE_API_KEY }}
          DECIBEL_GAS_STATION_API_KEY: ${{ secrets.DECIBEL_GAS_STATION_API_KEY }}
          POSITION_SIZE_USD:           ${{ secrets.POSITION_SIZE_USD }}
          LEVERAGE:                    ${{ secrets.LEVERAGE }}
          SLIPPAGE:                    ${{ secrets.SLIPPAGE }}
          STOP_LOSS_USD:               ${{ secrets.STOP_LOSS_USD }}
          TRAIL_ACTIVATE_USD:          ${{ secrets.TRAIL_ACTIVATE_USD }}
          TRAIL_GIVEBACK_USD:          ${{ secrets.TRAIL_GIVEBACK_USD }}
          TRAIL_FLIP_GIVEBACK_USD:     ${{ secrets.TRAIL_FLIP_GIVEBACK_USD }}
          COINMARKETCAP_API_KEY:       ${{ secrets.COINMARKETCAP_API_KEY }}
        run: python btcd_trader.py

      - name: Save state to repo
        if: always()
        run: |
          git config user.name  "BTC.D Trader Bot"
          git config user.email "trader-bot@noreply.github.com"
          git stash
          git pull --rebase origin main || true
          git stash pop || true
          git add trader_state.json trader_log.json
          git diff --staged --quiet || git commit -m "bot: update trader state [skip ci]"
          git push
