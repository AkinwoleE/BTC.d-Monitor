name: BTC.D Pairs Trader

on:
  schedule:
    - cron: '0,15,30,45 * * * *'
  workflow_dispatch:

jobs:
  trade:
    name: Run Signal Check + Execute Trade
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Restore trader state
        uses: actions/cache@v4
        with:
          path: trader_state.json
          key: trader-state-${{ github.run_id }}
          restore-keys: |
            trader-state-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js (for Decibel CLI)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python dependencies
        run: pip install requests

      - name: Run trader
        env:
          TELEGRAM_BOT_TOKEN:          ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:            ${{ secrets.TELEGRAM_CHAT_ID }}
          DECIBEL_PRIVATE_KEY:         ${{ secrets.DECIBEL_PRIVATE_KEY }}
          DECIBEL_SUBACCOUNT:          ${{ secrets.DECIBEL_SUBACCOUNT }}
          DECIBEL_NODE_API_KEY:        ${{ secrets.DECIBEL_NODE_API_KEY }}
          DECIBEL_GAS_STATION_API_KEY: ${{ secrets.DECIBEL_GAS_STATION_API_KEY }}
          POSITION_SIZE_USD:           ${{ secrets.POSITION_SIZE_USD }}
          LEVERAGE:                    ${{ secrets.LEVERAGE }}
          SLIPPAGE:                    ${{ secrets.SLIPPAGE }}
        run: python btcd_trader.py

      - name: Save trader state
        if: always()
        uses: actions/cache@v4
        with:
          path: trader_state.json
          key: trader-state-${{ github.run_id }}
