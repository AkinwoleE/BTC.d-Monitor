name: BTC.D Pairs Trader

on:
  schedule:
    # Every 15 minutes around the clock
    - cron: '0,15,30,45 * * * *'
  # Manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  trade:
    name: Run Signal Check + Execute Trade
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # Restore state file from previous run
      - name: Restore trader state
        uses: actions/cache@v4
        with:
          path: trader_state.json
          key: trader-state-${{ github.run_id }}
          restore-keys: |
            trader-state-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run trader
        env:
          TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}
          DECIBEL_BEARER_TOKEN: ${{ secrets.DECIBEL_BEARER_TOKEN }}
          DECIBEL_ACCOUNT:      ${{ secrets.DECIBEL_ACCOUNT }}
          DECIBEL_SUBACCOUNT:   ${{ secrets.DECIBEL_SUBACCOUNT }}
          POSITION_SIZE_USD:    ${{ secrets.POSITION_SIZE_USD }}
          LEVERAGE:             ${{ secrets.LEVERAGE }}
          SLIPPAGE:             ${{ secrets.SLIPPAGE }}
        run: python btcd_trader.py

      # Save updated state for next run
      - name: Save trader state
        if: always()
        uses: actions/cache@v4
        with:
          path: trader_state.json
          key: trader-state-${{ github.run_id }}
