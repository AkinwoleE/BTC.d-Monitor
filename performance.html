<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>BTC.D Trader · Performance</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0e14;--surface:#13151f;--s2:#181b2a;--border:#232640;
  --purple:#7c5cfc;--cyan:#38bdf8;--green:#22c55e;--red:#ef4444;--yellow:#f59e0b;
  --text:#e2e8f0;--text2:#94a3b8;--text3:#475569;
  --font:"Inter",sans-serif;--mono:"JetBrains Mono",monospace;
}
[data-theme=light]{
  --bg:#f1f5f9;--surface:#fff;--s2:#f8fafc;--border:#e2e8f0;
  --text:#0f172a;--text2:#475569;--text3:#94a3b8;
}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;font-size:14px}
a{color:var(--cyan);text-decoration:none}a:hover{text-decoration:underline}
.wrap{max-width:1280px;margin:0 auto;padding:24px 20px}
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:12px}
header h1{font-size:1.35rem;font-weight:700;letter-spacing:-.02em}
header h1 span{color:var(--purple)}
.hdr-right{display:flex;align-items:center;gap:10px}
.btn{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:7px 14px;cursor:pointer;font-size:13px;color:var(--text);transition:border-color .15s;font-family:var(--font)}
.btn:hover{border-color:var(--purple)}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px}
@media(max-width:700px){.stats{grid-template-columns:repeat(2,1fr)}}
@media(max-width:400px){.stats{grid-template-columns:1fr}}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 20px}
.card.lp{border-left:3px solid var(--purple)}
.card.lc{border-left:3px solid var(--cyan)}
.card.lg{border-left:3px solid var(--green)}
.card.lr{border-left:3px solid var(--red)}
.card.ly{border-left:3px solid var(--yellow)}
.lbl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text2);margin-bottom:7px}
.val{font-family:var(--mono);font-size:1.55rem;font-weight:600;line-height:1}
.sub{font-size:12px;color:var(--text2);margin-top:5px}
.g{color:var(--green)}.r{color:var(--red)}.y{color:var(--yellow)}.c{color:var(--cyan)}.m{color:var(--text2)}
section{margin-bottom:20px}
.chart-wrap{position:relative;height:240px}
.pos-row{display:flex;gap:28px;flex-wrap:wrap;margin-top:12px}
.pi label{font-size:11px;color:var(--text2);display:block;margin-bottom:3px}
.pi .pv{font-family:var(--mono);font-size:13px}
.badge{display:inline-block;padding:2px 9px;border-radius:99px;font-size:11px;font-weight:600}
.b-open{background:rgba(34,197,94,.12);color:var(--green)}
.b-flat{background:rgba(100,116,139,.12);color:var(--text2)}
.b-btc{background:rgba(245,158,11,.12);color:var(--yellow)}
.b-eth{background:rgba(56,189,248,.12);color:var(--cyan)}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:7px 10px;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--text2);border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:9px 10px;border-bottom:1px solid var(--border);font-family:var(--mono);white-space:nowrap}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--s2)}
.sl-btc{color:var(--yellow)}.sl-eth{color:var(--cyan)}
.empty{text-align:center;padding:40px;color:var(--text2)}
.bars{color:var(--purple);letter-spacing:1px}
.b-trail{background:rgba(245,158,11,.15);color:var(--yellow)}
.b-flip{background:rgba(56,189,248,.15);color:var(--cyan)}
.b-stop{background:rgba(239,68,68,.15);color:var(--red)}
.b-orphan{background:rgba(100,116,139,.12);color:var(--text2)}
</style>
</head>
<body>
<div class="wrap">
<header>
  <div><h1>BTC.D Pairs Trader &middot; <span>Performance</span></h1></div>
  <div id="last-upd" style="font-size:12px;color:var(--text2);margin-bottom:4px"></div><div class="hdr-right">
    <a href="unified.html" class="btn">← Live Monitor</a>
    <button class="btn" id="tbtn">&#9728;&#65039;</button>
  </div>
</header>

<div class="stats">
  <div class="card lp"><div class="lbl">Total Trades</div><div class="val" id="s-tot">—</div></div>
  <div class="card lc"><div class="lbl">Win Rate</div><div class="val" id="s-wr">—</div></div>
  <div class="card lg"><div class="lbl">Total PnL</div><div class="val" id="s-pnl">—</div></div>
  <div class="card lg"><div class="lbl">Best Trade</div><div class="val" id="s-best">—</div></div>
  <div class="card lr"><div class="lbl">Worst Trade</div><div class="val" id="s-worst">—</div></div>
  <div class="card lp"><div class="lbl">Avg / Trade</div><div class="val" id="s-avg">—</div></div>
</div>

<section>
  <div class="card lp" style="padding:20px 24px">
    <div class="lbl">Cumulative PnL</div>
    <div class="chart-wrap" style="margin-top:14px"><canvas id="ch"></canvas></div>
  </div>
</section>

<section>
  <div class="card lc" id="pos-card">
    <div class="lbl">Current Position</div>
    <div id="pos-body"><span class="m">Loading…</span></div>
  </div>
</section>

<section>
  <div class="card">
    <div class="lbl" style="margin-bottom:14px">Trade History</div>
    <div class="tbl-wrap" id="tbl">
      <div class="empty">No trades recorded yet — trades appear after the first signal fires.</div>
    </div>
  </div>
</section>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
const $=id=>document.getElementById(id);
let dark=localStorage.getItem('theme')!=='light';
const tbtn=$("tbtn");
function applyTheme(){
  document.documentElement.setAttribute('data-theme',dark?'dark':'light');
  tbtn.textContent=dark?'\u2600\ufe0f':'\ud83c\udf19';
  localStorage.setItem('theme',dark?'dark':'light');
}
tbtn.onclick=()=>{dark=!dark;applyTheme();rebuildChart()};
applyTheme();

const fmt=(n,d=2)=>n==null?'\u2014':(+n).toFixed(d);
const fmtDate=ts=>{
  const d=new Date(ts);
  return d.toLocaleDateString('en-GB',{month:'short',day:'numeric'})
    +' '+d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
};
const pc=n=>n>0?'g':n<0?'r':'';
const bars=n=>'\u2588'.repeat(n)+'\u2591'.repeat(5-n);

function pairTrades(log){
  const out=[],opens={};
  for(const e of log){
    if(e.action==='OPEN') opens[e.signal]=e;
    else if(e.action==='CLOSE'){
      out.push({open:opens[e.signal]||null,close:e});
      delete opens[e.signal];
    }
  }
  for(const o of Object.values(opens)) out.push({open:o,close:null});
  return out;
}
function stats(trades){
  const cl=trades.filter(t=>t.close?.pnl!=null);
  const ps=cl.map(t=>t.close.pnl);
  const w=ps.filter(p=>p>0).length;
  const tot=ps.reduce((a,b)=>a+b,0);
  return{total:trades.length,closed:cl.length,
    wr:cl.length?w/cl.length*100:null,
    pnl:cl.length?tot:null,
    best:ps.length?Math.max(...ps):null,
    worst:ps.length?Math.min(...ps):null,
    avg:cl.length?tot/cl.length:null};
}

let chart=null,lastTrades=[];
function rebuildChart(){
  const cl=lastTrades.filter(t=>t.close?.pnl!=null);
  const cl2=cl.slice(1);
  const labels=['Start',...cl2.map(t=>fmtDate(t.close.timestamp))];
  let cum=0;
  const data=[0,...cl2.map(t=>{cum+=t.close.pnl;return+cum.toFixed(2)})];
  const gridClr=dark?'rgba(255,255,255,.05)':'rgba(0,0,0,.06)';
  const tickClr=dark?'#475569':'#94a3b8';
  if(chart)chart.destroy();
  chart=new Chart($("ch"),{
    type:'line',
    data:{labels,datasets:[{data,
      borderColor:'#7c5cfc',
      backgroundColor:ctx=>{const g=ctx.chart.ctx.createLinearGradient(0,0,0,240);
        g.addColorStop(0,'rgba(124,92,252,.22)');g.addColorStop(1,'rgba(124,92,252,0)');return g},
      fill:true,tension:.35,pointRadius:data.length<20?4:2,
      pointBackgroundColor:'#7c5cfc',borderWidth:2}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{
        label:c=>` $${c.raw.toFixed(2)}`}}},
      scales:{
        x:{ticks:{color:tickClr,font:{size:11},maxTicksLimit:8},grid:{color:gridClr}},
        y:{ticks:{color:tickClr,font:{family:'JetBrains Mono',size:11},
            callback:v=>`$${v.toFixed(0)}`},grid:{color:gridClr}}
      }}
  });
}

function renderPos(state){
  const el=$("pos-body");
  if(!state?.position_open){
    el.innerHTML='<span class="m">No open position &mdash; </span><span class="badge b-flat">FLAT</span>';
    return;
  }
  const s=state.current_signal,lb=s==='LONG_BTC';
  el.innerHTML=`<div class="pos-row">
    <div class="pi"><label>Signal</label><div class="pv"><span class="badge ${lb?'b-btc':'b-eth'}">${s}</span></div></div>
    <div class="pi"><label>Status</label><div class="pv"><span class="badge b-open">OPEN</span></div></div>
    ${state.entry_btc_size?`<div class="pi"><label>BTC Size</label><div class="pv">${state.entry_btc_size}</div></div>`:''}
    ${state.entry_eth_size?`<div class="pi"><label>ETH Size</label><div class="pv">${state.entry_eth_size}</div></div>`:''}
    ${state.entry_btc_price?`<div class="pi"><label>BTC Entry</label><div class="pv">$${(+state.entry_btc_price).toLocaleString()}</div></div>`:''}
    ${state.entry_eth_price?`<div class="pi"><label>ETH Entry</label><div class="pv">$${(+state.entry_eth_price).toFixed(2)}</div></div>`:''}
    ${state.entry_time_utc?`<div class="pi"><label>Opened</label><div class="pv">${fmtDate(state.entry_time_utc)}</div></div>`:''}
    <div class="pi"><label>Total Trades</label><div class="pv">${state.trade_count||0}</div></div>
  </div>`;
}

function exitBadge(reason){
  if(!reason) return '\u2014';
  if(reason==='TRAIL_STOP')    return '<span class="badge b-trail">Trail Stop</span>';
  if(reason==='SIGNAL_FLIP')   return '<span class="badge b-flip">Signal Flip</span>';
  if(reason==='STOP_LOSS')     return '<span class="badge b-stop">Stop Loss</span>';
  if(reason==='ORPHAN_CLEANUP') return '<span class="badge b-orphan">Cleanup</span>';
  return `<span class="badge b-orphan">${reason}</span>`;
}
function renderTable(trades){
  if(!trades.length)return;
  const rows=trades.slice().reverse().map((t,i)=>{
    const sig=t.open?.signal||t.close?.signal||'';
    const sc=sig==='LONG_BTC'?'sl-btc':sig==='LONG_ETH'?'sl-eth':'';
    const opened=t.open?fmtDate(t.open.timestamp):'\u2014';
    const closed=t.close?fmtDate(t.close.timestamp):'<span class="badge b-open">OPEN</span>';
    const be=t.open?.btc_entry_price?`$${(+t.open.btc_entry_price).toLocaleString()}`:'\u2014';
    const ee=t.open?.eth_entry_price?`$${(+t.open.eth_entry_price).toFixed(2)}`:'\u2014';
    const dur=t.close?.trade_duration_minutes!=null?`${t.close.trade_duration_minutes}m`:'\u2014';
    const pnl=t.close?.pnl!=null?`<span class="${pc(t.close.pnl)}">$${fmt(t.close.pnl)}</span>`:'\u2014';
    const peak=t.close?.peak_pnl!=null?`<span class="g">$${fmt(t.close.peak_pnl)}</span>`:'\u2014';
    const str=t.open?.signal_strength!=null?`<span class="bars">${bars(t.open.signal_strength)}</span>`:'\u2014';
    const reason=exitBadge(t.close?.exit_reason);
    return`<tr><td class="m">${trades.length-i}</td>
      <td class="${sc}">${sig.replace('LONG_','')}</td>
      <td>${t.open?.btc_side||'\u2014'} / ${t.open?.eth_side||'\u2014'}</td>
      <td>${be}</td><td>${ee}</td>
      <td>${opened}</td><td>${closed}</td>
      <td>${dur}</td><td>${pnl}</td><td>${peak}</td><td>${reason}</td><td>${str}</td></tr>`;
  }).join('');
  $("tbl").innerHTML=`<table><thead><tr>
    <th>#</th><th>Signal</th><th>BTC/ETH</th>
    <th>BTC Entry</th><th>ETH Entry</th>
    <th>Opened</th><th>Closed</th>
    <th>Duration</th><th>PnL</th><th>Peak PnL</th><th>Close</th><th>Strength</th>
  </tr></thead><tbody>${rows}</tbody></table>`;
}

async function load(){
  const[lr,sr]=await Promise.allSettled([
    fetch('./trader_log.json?t='+Date.now()).then(r=>r.ok?r.json():[]).catch(()=>[]),
    fetch('./trader_state.json?t='+Date.now()).then(r=>r.ok?r.json():{}).catch(()=>{})
  ]);
  const log=lr.status==='fulfilled'?lr.value:[];
  const state=sr.status==='fulfilled'?sr.value:{};
  lastTrades=pairTrades(log);
  const st=stats(lastTrades);
  $("s-tot").textContent=st.total;
  $("s-wr").innerHTML=st.wr!=null?`<span class="${st.wr>=50?'g':'r'}">${st.wr.toFixed(1)}%</span>`:'—';
  $("s-pnl").innerHTML=st.pnl!=null?`<span class="${pc(st.pnl)}">$${fmt(st.pnl)}</span>`:'—';
  $("s-best").innerHTML=st.best!=null?`<span class="g">+$${fmt(st.best)}</span>`:'—';
  $("s-worst").innerHTML=st.worst!=null?`<span class="r">$${fmt(st.worst)}</span>`:'—';
  $("s-avg").innerHTML=st.avg!=null?`<span class="${pc(st.avg)}">$${fmt(st.avg)}</span>`:'—';
  rebuildChart();
  renderPos(state);
  renderTable(lastTrades);
}
async function loadAndStamp(){await load();const el=document.getElementById("last-upd");if(el)el.textContent="Updated "+new Date().toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit",second:"2-digit"});}
loadAndStamp();
setInterval(loadAndStamp,60000);
</script>
</body></html>
